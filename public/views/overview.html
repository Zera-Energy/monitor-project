<!-- /views/overview.html -->
<section class="overviewView">
  <!-- HERO -->
  <div class="ovHero">
    <div class="ovHeroLeft">
      <div class="ovBrandPill">
        <span class="ovBrandIcon">💾</span>
        <span>Zera-Energy</span>
      </div>

      <div class="ovHeroTitle">Devices Overview</div>
      <div class="ovHeroSub">All registered devices across your sites</div>
    </div>

    <div class="ovHeroRight">
      <div class="ovHeroStats">
        <div class="ovMiniStat">
          <div class="ovMiniIcon">🗂️</div>
          <div class="ovMiniNum" id="sumTotal">-</div>
          <div class="ovMiniLbl">Total</div>
        </div>

        <div class="ovMiniStat online">
          <div class="ovMiniIcon">📶</div>
          <div class="ovMiniNum" id="sumOnline">-</div>
          <div class="ovMiniLbl">Online</div>
        </div>

        <div class="ovMiniStat offline">
          <div class="ovMiniIcon">📡</div>
          <div class="ovMiniNum" id="sumOffline">-</div>
          <div class="ovMiniLbl">Offline</div>
        </div>
      </div>

      <button class="ovIconBtn" id="btnOvRefresh" type="button" title="refresh">⟳</button>
      <button class="ovAddBtn" id="btnAddDevice" type="button">＋ addDevice</button>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="ovBar">
    <div class="ovBarLeft">
      <select class="select" id="filterStatus">
        <option value="all">All Devices</option>
        <option value="online">Online</option>
        <option value="offline">Offline</option>
      </select>

      <div class="ovCount" id="deviceCount">(0 devices)</div>
    </div>

    <div class="ovBarRight">
      <span class="muted">Last update:</span>
      <b id="lastUpdate">-</b>
    </div>
  </div>

  <!-- GRID -->
  <div class="ovGrid" id="deviceGrid"></div>

  <div class="ovEmpty" id="emptyState" style="display:none;">
    <div class="muted">No devices</div>
  </div>
</section>
