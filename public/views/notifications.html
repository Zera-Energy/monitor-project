<!-- /views/notifications.html -->
<section class="notiView">
  <div class="pageHeader">
    <h2 class="pageTitle">Device Notifications</h2>
  </div>

  <!-- ✅ Toolbar -->
  <div class="toolbar">
    <div class="toolbarLeft">
      <!-- ✅ Severity 필터 -->
      <select class="select" id="notiSeverity">
        <option value="all">All Severity</option>
        <option value="danger">Critical</option>
        <option value="warn">Warning</option>
        <option value="info">Info</option>
      </select>

      <!-- ✅ Category 필터 -->
      <select class="select" id="notiType">
        <option value="all">All Types</option>
        <option value="offline">Offline</option>
        <option value="thd">THD</option>
        <option value="pf">Power Factor</option>
        <option value="voltage">Voltage</option>
        <option value="current">Current</option>
      </select>
    </div>

    <div class="toolbarRight">
      <input class="input" id="notiSearch" placeholder="Search device, code, message..." />
      <button class="btn amber" id="btnNotiSearch" type="button">Search</button>
    </div>
  </div>

  <section class="card big">
    <div class="cardTitle">Alert List</div>

    <div class="tableWrap">
      <table class="table">
        <thead>
          <tr>
            <th class="sortable">No.</th>
            <th class="sortable">Severity</th>
            <th class="sortable">Device</th>
            <th class="sortable">Code</th>
            <th class="sortable">Type</th>
            <th class="sortable">Message</th>
            <th class="sortable">Value</th>
            <th class="sortable">Time</th>
            <th class="sortable">Age</th>
            <th class="sortable">Status</th>
          </tr>
        </thead>

        <!-- ✅ JS가 여기를 채움 -->
        <tbody id="notiTbody">
          <tr>
            <td colspan="10" class="empty">Waiting alerts...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- ✅ 하단 상태/버튼 -->
    <div class="mt12" style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
      <div class="muted" id="notiLastUpdate">Last update: -</div>
      <button class="btn" id="btnNotiAskPermission" type="button">🔔 Enable browser alerts</button>
      <button class="btn" id="btnNotiClearAck" type="button">Clear ACK</button>
      <button class="btn danger" id="btnNotiClearAll" type="button">Clear ALL</button>
    </div>
  </section>
</section>
