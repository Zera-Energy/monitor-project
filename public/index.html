<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>K-Saver Monitoring</title>

  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/views.common.css" />

  <link rel="icon" href="data:,">

  <!-- mqtt 전역 라이브러리(브라우저용) -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <!-- config.js에서 window.API_BASE, window.MQTT_URL 등 설정 -->
  <script src="/js/config.js"></script>

  <!-- ✅ 토큰 없거나(또는 따옴표 같은 비정상 토큰)면 login.html로 -->
  <script>
    (function () {
      function cleanToken(v){
        return String(v || "").trim().replace(/^"+|"+$/g, "");
      }

      const raw = localStorage.getItem("token");
      const token = cleanToken(raw);

      // JWT는 보통 점(.)이 2개 있는 형태: header.payload.signature
      const looksLikeJwt = token && token.split(".").length >= 3;

      if (!looksLikeJwt) {
        location.replace("/login.html");
      }
    })();
  </script>
</head>
<body>

  <div class="app">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">KS</div>
        <div class="brandText">
          <div class="brandName">K-Saver</div>
          <div class="brandSub">K-Saver Monitoring</div>
        </div>
      </div>

      <div class="menuSectionTitle">Navigation</div>
      <nav class="menu">

        <a class="item" href="#dashboard" data-route="dashboard">
          <span class="icon">▦</span>
          <span class="label">Dashboard</span>
        </a>

        <a class="item" href="#overview" data-route="overview">
          <span class="icon">▣</span>
          <span class="label">Overview</span>
        </a>

        <a class="item" href="#monitor" data-route="monitor">
          <span class="icon">▤</span>
          <span class="label">Monitor</span>
        </a>

        <a class="item" href="#location" data-route="location">
          <span class="icon">⌖</span>
          <span class="label">Location</span>
        </a>

        <!-- CONFIGURATIONS (collapsible) -->
        <button class="groupHeader" data-toggle="group-config" type="button">
          <span class="groupTitle">CONFIGURATIONS</span>
          <span class="chev">▾</span>
        </button>

        <div class="group" id="group-config">
          <a class="item" href="#notifications" data-route="notifications">
            <span class="icon">🔔</span>
            <span class="label">Notifications</span>
          </a>

          <a class="item" href="#devices" data-route="devices">
            <span class="icon">⚙</span>
            <span class="label">Devices Setting</span>
          </a>

          <a class="item" href="#dashboard-setting" data-route="dashboard-setting">
            <span class="icon">🗂</span>
            <span class="label">Dashboard Setting</span>
          </a>
        </div>

        <!-- USER SUPPORTS (collapsible) -->
        <button class="groupHeader" data-toggle="group-support" type="button">
          <span class="groupTitle">USER SUPPORTS</span>
          <span class="chev">▾</span>
        </button>

        <div class="group" id="group-support">
          <a class="item" href="#products" data-route="products">
            <span class="icon">ⓘ</span>
            <span class="label">Products Info</span>
          </a>
        </div>

        <a class="item" href="#profile" data-route="profile">
          <span class="icon">🙂</span>
          <span class="label">User Profile</span>
        </a>

      </nav>
    </aside>

    <!-- RIGHT -->
    <div class="right">
      <!-- TOPBAR -->
      <header class="topbar">
        <button class="iconBtn" id="btnSidebar" type="button">☰</button>

        <div class="topbarRight">
          <button class="iconBtn" type="button">🌐</button>

          <!-- ✅ 알림 드롭다운 -->
          <div class="topNotiWrap" id="topNoti">
            <button class="iconBtn topNotiBtn" id="btnTopNoti" type="button" aria-label="Notifications">
              <span class="topNotiIcon">🔔</span>
              <span class="topNotiBadge" id="topNotiBadge" hidden>0</span>
            </button>

            <div class="topNotiDropdown" id="topNotiDropdown" hidden>
              <div class="topNotiHead">
                <div>
                  <div class="topNotiTitle">Active Alerts</div>
                  <div class="topNotiMeta" id="topNotiMeta">Critical 0 · Warning 0</div>
                </div>

                <div class="topNotiActions">
                  <button class="topNotiLink" id="btnTopNotiClearAck" type="button">Remove ACKed</button>
                  <button class="topNotiLink" id="btnTopNotiViewAll" type="button">View all</button>
                </div>
              </div>

              <div class="topNotiList" id="topNotiList">
                <div class="topNotiEmpty">No active alerts</div>
              </div>
            </div>
          </div>

          <!-- ✅ MQTT 상태 표시 칩 -->
          <div class="chip" id="mqttStatusChip">MQTT: …</div>

          <!-- ✅ API 상태 표시 칩 -->
          <div class="chip" id="apiStatusChip">API: …</div>

          <!-- ✅ 유저 표시 영역(id 유지) -->
          <div class="user" id="topUser">
            <div class="avatar" id="topAvatar">U</div>
            <div class="userText" id="topUserText">Signed in</div>
          </div>

          <!-- ✅ Logout 버튼(id 유지) -->
          <button class="btn" id="btnTopLogout" type="button" style="height:34px;padding:0 10px;">Logout</button>
        </div>
      </header>

      <!-- PAGE -->
      <main class="page">
        <div class="pageInner">
          <div id="view"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- ✅ 경로 통일: /js/... -->
  <script src="/js/sidebar.js"></script>

  <!-- ❌ 제거: /js/topbar.js
       이유: 이제 topbar 로직은 /js/app.js (module)에서 import로 처리함 -->

  <script src="/js/dev_developer.js"></script>

  <!-- ✅ 경로 통일: /js/app.js -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
